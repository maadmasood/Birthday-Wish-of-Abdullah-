<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ABDULLAH</title>
<style>
  :root{
    --gold: #d4af37;
    --gold-light: #f5e6a8;
    --navy: #1c2a3a;
    --black: #0a0a0a;
    --black2: #0f1520;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background: radial-gradient(circle at center, var(--black2) 0%, var(--black) 100%);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow-x:hidden;
    color:#fff;
  }
  #confetti-canvas{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:5;
  }
  .container{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 30px 20px 60px;
  }
  .frame{
    border: 1px solid var(--gold);
    border-radius: 18px;
    padding: 40px 30px;
    max-width: 480px;
    width: 100%;
    background: linear-gradient(180deg, rgba(212,175,55,0.06), rgba(0,0,0,0.2));
    box-shadow: 0 0 40px rgba(212,175,55,0.15), inset 0 0 30px rgba(212,175,55,0.05);
    backdrop-filter: blur(4px);
    animation: floatIn 1.2s ease-out;
  }
  @keyframes floatIn{
    from{opacity:0; transform: translateY(30px);}
    to{opacity:1; transform: translateY(0);}
  }
  .crown{
    font-size: 2.4rem;
    margin-bottom: 6px;
    color: var(--gold);
    text-shadow: 0 0 15px rgba(212,175,55,0.6);
  }
  .eyebrow{
    letter-spacing: 4px;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--gold-light);
    opacity: 0.85;
    margin-bottom: 14px;
  }
  h1{
    font-size: clamp(2rem, 8vw, 3.2rem);
    background: linear-gradient(180deg, var(--gold-light), var(--gold) 60%, #a97e1a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 2px;
    margin-bottom: 6px;
    font-weight: bold;
  }
  .name{
    font-size: clamp(2.2rem, 10vw, 3.6rem);
    font-family: 'Brush Script MT', cursive;
    background: linear-gradient(180deg, #fff6d0, var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 10px 0 20px;
    text-shadow: 0 0 25px rgba(212,175,55,0.35);
  }
  .divider{
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 18px auto;
  }
  p.message{
    font-size: 1.05rem;
    line-height: 1.7;
    color: #e8e0c9;
    margin-bottom: 24px;
    font-style: italic;
  }
  .btn{
    display: inline-block;
    padding: 12px 32px;
    border: 1px solid var(--gold);
    border-radius: 30px;
    color: var(--gold-light);
    text-decoration: none;
    letter-spacing: 2px;
    font-size: 0.85rem;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    transition: all 0.3s ease;
  }
  .btn:hover, .btn:active{
    background: var(--gold);
    color: #000;
    box-shadow: 0 0 20px rgba(212,175,55,0.5);
  }
  .footer-note{
    margin-top: 26px;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }
  @media (max-width: 380px){
    .frame{ padding: 30px 18px; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="container">
  <div class="frame">
    <div class="crown">♛</div>
    <div class="eyebrow">A Celebration Of</div>
    <h1>Happy Birthday</h1>
    <div class="name">ABDULLAH</div>
    <div class="divider"></div>
    <p class="message">
      Wishing you a year as strong and distinguished as your character —
      filled with success, honor, and moments worth remembering.
      May this new chapter bring you closer to every goal you're chasing.
    </p>
    <button class="btn" onclick="burst()">✨ Celebrate</button>
    <div class="footer-note">With Love & Respect</div>
  </div>
</div>

<script>
// Confetti animation
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const colors = ['#d4af37', '#f5e6a8', '#ffffff', '#a97e1a', '#fff6d0'];
let particles = [];

function createParticle(x, y){
  return {
    x: x !== undefined ? x : Math.random() * W,
    y: y !== undefined ? y : Math.random() * -H,
    size: Math.random() * 7 + 4,
    color: colors[Math.floor(Math.random() * colors.length)],
    speedY: Math.random() * 2 + 1.5,
    speedX: Math.random() * 2 - 1,
    rotation: Math.random() * 360,
    rotationSpeed: Math.random() * 6 - 3,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    opacity: 1
  };
}

function initParticles(count){
  for(let i=0;i<count;i++){
    particles.push(createParticle());
  }
}
initParticles(90);

function burst(){
  for(let i=0;i<80;i++){
    particles.push(createParticle(W/2 + (Math.random()*200-100), H/2));
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  particles.forEach((p, i) => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = p.color;
    if(p.shape === 'rect'){
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size/2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();

    p.y += p.speedY;
    p.x += p.speedX;
    p.rotation += p.rotationSpeed;

    if(p.y > H + 20){
      p.y = -20;
      p.x = Math.random() * W;
    }
    if(p.x > W + 20) p.x = -20;
    if(p.x < -20) p.x = W + 20;
  });

  if(particles.length > 300){
    particles.splice(0, particles.length - 220);
  }

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
